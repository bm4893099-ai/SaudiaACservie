<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Saudia AC Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/premium-light.css" />
    <link rel="stylesheet" href="/css/portfolio-luxe.css" />
  </head>
  <body data-page="contact">
    <div class="page-shell">
      <header class="site-header">
        <div class="container nav-row">
          <a class="brand" href="/">
            <img class="brand-logo" src="/images/logo.png" alt="Saudia AC Service" />
            <span class="brand-copy">
              <strong id="brandName">Saudia AC Service</strong>
              <small id="brandTagline">Premium Appliance Repair Experts in Dammam</small>
            </span>
          </a>
          <nav class="nav-links">
            <a href="/" data-nav="home">Home</a>
            <a href="/contact/" data-nav="contact">Contact</a>
            <a href="/admin/" class="nav-cta" data-nav="admin">Admin</a>
            <button id="languageToggle" class="lang-toggle" type="button">العربية</button>
          </nav>
        </div>
      </header>

      <main class="contact-page-main">
        <section class="inner-hero-section contact-editorial-hero">
          <div class="container section-heading centered glass-panel section-shell">
            <span class="eyebrow" id="contactEyebrow"></span>
            <h1 id="contactTitle"></h1>
            <p id="contactSubtitle"></p>
          </div>
        </section>

        <section class="contact-layout-section">
          <div class="container contact-grid-layout contact-grid-premium">
            <div class="contact-form-panel glass-panel">
              <h2 id="formHeading"></h2>
              <p id="formIntro"></p>
              <form id="contactForm" class="premium-form">
                <div class="form-grid">
                  <label>
                    <span id="labelName"></span>
                    <input id="contactName" name="name" type="text" required />
                  </label>
                  <label>
                    <span id="labelPhone"></span>
                    <input id="contactPhone" name="phone" type="tel" required />
                  </label>
                  <label>
                    <span id="labelService"></span>
                    <select id="contactServiceType" name="serviceType" required></select>
                  </label>
                  <label>
                    <span id="labelLocation"></span>
                    <input id="contactLocation" name="location" type="text" />
                  </label>
                  <label>
                    <span id="labelPreferredDate"></span>
                    <input id="contactPreferredDate" name="preferredDate" type="text" />
                  </label>
                  <label class="full-width">
                    <span id="labelMessage"></span>
                    <textarea id="contactMessage" name="message" rows="6" required></textarea>
                  </label>
                </div>
                <button id="contactSubmitButton" class="primary-button full-width-button" type="submit"></button>
                <p id="contactFormStatus" class="form-status" role="status"></p>
              </form>
            </div>

            <aside class="contact-sidebar">
              <div class="glass-panel info-card info-card-featured">
                <span id="contactFeatureEyebrow"></span>
                <p id="contactFeatureCopy" class="info-feature-copy"></p>
                <h3 id="directContactTitle"></h3>
                <div class="info-list">
                  <a id="contactPhoneLink" href="#"></a>
                  <a id="contactEmailLink" href="#"></a>
                  <a id="contactWhatsappLink" href="#" target="_blank" rel="noreferrer">WhatsApp</a>
                </div>
              </div>
              <div class="glass-panel info-card">
                <h3 id="visitUsTitle"></h3>
                <div class="info-list">
                  <span id="contactAddress"></span>
                  <span id="contactHours"></span>
                  <a id="contactMapLink" href="#" target="_blank" rel="noreferrer"></a>
                </div>
              </div>
              <div class="glass-panel info-card">
                <h3 id="socialTitle"></h3>
                <div id="footerSocialLinks" class="social-links"></div>
              </div>
            </aside>
          </div>
        </section>
      </main>

      <footer class="site-footer compact-footer">
        <div class="container footer-grid">
          <div class="footer-brand">
            <img class="brand-logo" src="/images/logo.png" alt="Saudia AC Service" />
            <div>
              <h3 id="footerBusinessName">Saudia AC Service</h3>
              <p id="footerNote"></p>
            </div>
          </div>
          <div class="footer-column">
            <h4 id="footerContactHeading">Contact</h4>
            <a id="footerPhoneLink" href="#"></a>
            <a id="footerEmailLink" href="#"></a>
            <span id="footerAddress"></span>
            <span id="footerHours"></span>
          </div>
        </div>
      </footer>
    </div>
    <script src="/js/site.js" defer></script>
  </body>
</html>
