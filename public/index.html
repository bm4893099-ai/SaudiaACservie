<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saudia AC Service</title>
    <meta
      name="description"
      content="Saudia AC Service delivers premium AC, fridge, washing machine, and electronics repair services in Dammam."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/premium-light.css" />
    <link rel="stylesheet" href="/css/portfolio-luxe.css" />
  </head>
  <body data-page="home">
    <div class="page-shell">
      <header class="site-header">
        <div class="container nav-row">
          <a class="brand" href="/">
            <span class="brand-mark">SA</span>
            <span class="brand-copy">
              <strong id="brandName">Saudia AC Service</strong>
              <small id="brandTagline">Premium Appliance Repair Experts in Dammam</small>
            </span>
          </a>
          <nav class="nav-links">
            <a href="#services" data-nav="services">Services</a>
            <a href="#about" data-nav="about">About</a>
            <a href="#contact-cta" data-nav="contact">Contact</a>
            <a href="/contact/" class="nav-cta" data-nav="book">Book Service</a>
            <button id="languageToggle" class="lang-toggle" type="button">العربية</button>
          </nav>
        </div>
      </header>

      <main class="portfolio-main">
        <section class="hero-section hero-premium">
          <div class="container hero-grid hero-grid-premium">
            <div class="hero-copy glass-panel hero-copy-premium">
              <span class="eyebrow" id="heroBadge"></span>
              <h1 id="heroTitle"></h1>
              <p id="heroSubtitle" class="hero-intro"></p>
              <div class="hero-actions">
                <a id="callNowButton" class="primary-button" href="#contact-cta">Call Now</a>
                <a class="secondary-button" href="/contact/" id="heroSecondaryCta">Request Visit</a>
              </div>
              <div class="hero-stats" id="heroStats"></div>
            </div>
            <div class="hero-visual hero-visual-premium">
              <div class="hero-card glass-panel">
                <span class="hero-card-label" id="featuredServiceLabel">Signature Repair Care</span>
                <div class="hero-service-preview" id="featuredServicePreview"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="services-section" id="services">
          <div class="container section-shell">
            <div class="section-heading section-heading-editorial">
              <span class="eyebrow" id="servicesEyebrow"></span>
              <h2 id="servicesTitle"></h2>
              <p id="servicesSubtitle"></p>
            </div>
            <div class="services-grid" id="servicesGrid"></div>
          </div>
        </section>

        <section class="luxury-strip">
          <div class="container luxury-strip-grid" id="highlightsGrid"></div>
        </section>

        <section class="about-section" id="about">
          <div class="container about-grid about-grid-premium">
            <div class="about-copy glass-panel">
              <span class="eyebrow" id="aboutEyebrow"></span>
              <h2 id="aboutTitle"></h2>
              <p id="aboutDescription"></p>
              <div class="quote-block">
                <span class="quote-index">01</span>
                <p id="brandQuote"></p>
              </div>
            </div>
            <div class="about-list glass-panel">
              <h3 id="whyChooseTitle"></h3>
              <div id="whyChooseList" class="feature-list"></div>
            </div>
          </div>
        </section>

        <section class="process-section">
          <div class="container section-shell">
            <div class="section-heading section-heading-editorial">
              <span class="eyebrow" id="processEyebrow"></span>
              <h2 id="processTitle"></h2>
              <p id="processSubtitle"></p>
            </div>
            <div class="process-grid" id="processGrid"></div>
          </div>
        </section>

        <section class="cta-section" id="contact-cta">
          <div class="container cta-panel glass-panel">
            <div>
              <span class="eyebrow" id="ctaEyebrow"></span>
              <h2 id="ctaTitle"></h2>
              <p id="ctaSubtitle"></p>
            </div>
            <div class="cta-actions">
              <a id="ctaPhoneLink" class="primary-button" href="#">Call Premium Support</a>
              <a id="ctaWhatsappLink" class="secondary-button" href="#" target="_blank" rel="noreferrer">WhatsApp</a>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container footer-grid">
          <div class="footer-brand">
            <span class="brand-mark">SA</span>
            <div>
              <h3 id="footerBusinessName">Saudia AC Service</h3>
              <p id="footerNote"></p>
            </div>
          </div>
          <div class="footer-column">
            <h4 id="footerContactHeading">Contact</h4>
            <a id="footerPhoneLink" href="#"></a>
            <a id="footerEmailLink" href="#"></a>
            <span id="footerAddress"></span>
            <span id="footerHours"></span>
          </div>
          <div class="footer-column">
            <h4 id="footerSocialHeading">Social</h4>
            <div id="footerSocialLinks" class="social-links"></div>
          </div>
        </div>
      </footer>
    </div>
    <script src="/js/site.js" defer></script>
  </body>
</html>
